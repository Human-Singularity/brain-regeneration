{{ define "main" }}

<section class="page-header bg-sand">
	<div class="container">
		<div class="narrow-col">
			<h1>{{ .Title }}</h1>
			{{ with .Description }}<p class="lead" style="font-size: 1.5rem; font-weight: 300; line-height: 1.6; margin-top: 16px; font-style: italic; letter-spacing: 0.01em;">{{ . }}</p>{{ end }}
		</div>
	</div>
</section>

<section class="bg-sand" style="padding-bottom: 80px;">
	<div class="container">
		<div class="narrow-col body-text">
			{{ .Content }}
			<p style="margin-top: 2rem; font-size: 0.875rem; color: #6b7280;">Last Updated: {{ .Lastmod.Format "2006-01-02" }}</p>
		</div>
	</div>
</section>

{{ end }}
